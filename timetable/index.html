<!DOCTYPE html>
<html>
<head>
    <title>2026 Academic Timetable Course Lookup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.min.css">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <h1>2026 Academic Timetable Course Lookup</h1>
        
        <div class="row">
            <div class="col-md-3">
                <div class="card p-3 mb-3">
                    <h4>Find Course</h4>
                    
                    <label>Enter Full Course Code:</label>
                    <input type="text" id="courseCode" class="form-control mb-3" placeholder="e.g., ACCY231">
                    
                    <hr>
                    <h5>OR Step by Step:</h5>
                    
                    <label>Course Prefix:</label>
                    <select id="prefix" class="form-select mb-2">
                        <option value="">Select...</option>
                    </select>
                    
                    <label>Course Number:</label>
                    <select id="number" class="form-select" disabled>
                        <option value="">Select...</option>
                    </select>
                </div>
            </div>
            
            <div class="col-md-9">
                <div class="card p-3">
                    <h3 id="resultHeader">Enter a course code to see timetable information</h3>
                    <table id="resultsTable" class="table table-striped" style="display:none;">
                        <thead>
                            <tr>
                                <th>CRN</th>
                                <th>Type</th>
                                <th>Students</th>
                                <th style="width:120px;">Dates</th>
                                <th>Room</th>
                                <th>Start</th>
                                <th>Finish</th>
                                <th>Days</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                    <div id="noResults" style="display:none;" class="alert alert-info">
                        No course found. Check the course code.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let courses = [];
        
        // Load the JSON data
        fetch('timetable_data.json')
            .then(response => response.json())
            .then(data => {
                courses = data;
                setupInterface();
            });
        
        function setupInterface() {
            // Get unique prefixes
            const prefixes = [...new Set(courses.map(c => c.course.substring(0, 4)))].sort();
            const prefixSelect = document.getElementById('prefix');
            
            prefixes.forEach(p => {
                prefixSelect.innerHTML += `<option value="${p}">${p}</option>`;
            });
            
            // Initialize DataTable
            $('#resultsTable').DataTable({
                paging: false,
                searching: false,
                info: false,
                scrollX: true
            });
            
            // Event listeners
            document.getElementById('courseCode').addEventListener('input', searchByCode);
            document.getElementById('prefix').addEventListener('change', updateNumbers);
            document.getElementById('number').addEventListener('change', searchByDropdown);
        }
        
        function searchByCode() {
            const code = document.getElementById('courseCode').value.trim().toUpperCase();
            
            // Clear dropdowns
            document.getElementById('prefix').value = '';
            document.getElementById('number').value = '';
            document.getElementById('number').disabled = true;
            
            if (code) {
                showResults(code);
            } else {
                clearResults();
            }
        }
        
        function updateNumbers() {
            const prefix = document.getElementById('prefix').value;
            const numberSelect = document.getElementById('number');
            
            // Clear text input
            document.getElementById('courseCode').value = '';
            
            if (prefix) {
                const numbers = [...new Set(
                    courses.filter(c => c.course.startsWith(prefix))
                           .map(c => c.course.substring(4))
                )].sort();
                
                numberSelect.innerHTML = '<option value="">Select...</option>';
                numbers.forEach(n => {
                    numberSelect.innerHTML += `<option value="${n}">${n}</option>`;
                });
                numberSelect.disabled = false;
            } else {
                numberSelect.innerHTML = '<option value="">Select...</option>';
                numberSelect.disabled = true;
                clearResults();
            }
        }
        
        function searchByDropdown() {
            const prefix = document.getElementById('prefix').value;
            const number = document.getElementById('number').value;
            
            if (prefix && number) {
                showResults(prefix + number);
            }
        }
        
        function showResults(courseCode) {
            const matches = courses.filter(c => c.course.toUpperCase() === courseCode);
            
            if (matches.length > 0) {
                document.getElementById('resultHeader').textContent = `Course Information for ${courseCode}`;
                
                const table = $('#resultsTable').DataTable();
                table.clear();
                
                matches.forEach(course => {
                    table.row.add([
                        course.crn,
                        course.type,
                        course.stu,
                        course.dates,
                        course.room,
                        course.start,
                        course.finish,
                        course.days
                    ]);
                });
                
                table.draw();
                document.getElementById('resultsTable').style.display = 'table';
                document.getElementById('noResults').style.display = 'none';
            } else {
                document.getElementById('resultHeader').textContent = `No results for ${courseCode}`;
                document.getElementById('resultsTable').style.display = 'none';
                document.getElementById('noResults').style.display = 'block';
            }
        }
        
        function clearResults() {
            document.getElementById('resultHeader').textContent = 'Enter a course code to see timetable information';
            document.getElementById('resultsTable').style.display = 'none';
            document.getElementById('noResults').style.display = 'none';
        }
    </script>
</body>
</html>
